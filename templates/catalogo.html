<!-- ===========================================================================
  CATALOGO  (templates/catalogo.html -> dist/catalogo/index.html)
  Guscio statico. Griglia, filtri, ricerca e ordinamento sono costruiti
  lato client da assets/js/catalogo.js leggendo {{base}}data/cards.json.
  Token usati: siteTitle, base, year, count.
  ============================================================================ -->
<link rel="stylesheet" href="{{base}}assets/css/style.css">
<script>
  (function () { try { var t = localStorage.getItem("cc-theme");
    if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
  } catch (e) {} })();
</script>

<!--BODY-->
<!-- ===== Header ===== -->
<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{base}}">
      <span class="mark">&#9824;</span>
      <span class="name">Catalogo <b>Carte</b></span>
    </a>
    <nav class="site-nav">
      <a href="{{base}}">Home</a>
      <a href="{{base}}catalogo/" aria-current="page">Catalogo</a>
      <button class="theme-toggle" type="button" aria-label="Cambia tema">&#9681;</button>
    </nav>
  </div>
</header>

<main id="catalog" data-base="{{base}}">
  <section class="catalog-head">
    <div class="wrap">
      <p class="eyebrow">L'intera collezione</p>
      <h1>Catalogo dei mazzi</h1>
      <p><span id="total">{{count}}</span> mazzi da sfogliare, filtrare e cercare.</p>
    </div>
  </section>

  <!-- ===== Barra filtri ===== -->
  <div class="toolbar">
    <div class="wrap">
      <label class="search">
        <span class="visually-hidden"></span>
        <input id="q" type="search" placeholder="Cerca per titolo, nazione, produttore&hellip;" autocomplete="off">
      </label>
      <select id="f-continent" class="select" aria-label="Filtra per continente"></select>
      <select id="f-country"   class="select" aria-label="Filtra per nazione"></select>
      <select id="f-category"  class="select" aria-label="Filtra per categoria"></select>
      <select id="f-type"      class="select" aria-label="Filtra per tipo"></select>
      <select id="f-sort" class="select" aria-label="Ordina">
        <option value="num-asc">N. crescente</option>
        <option value="num-desc">N. decrescente</option>
        <option value="title-asc">Titolo A&rarr;Z</option>
        <option value="title-desc">Titolo Z&rarr;A</option>
        <option value="country">Nazione</option>
      </select>
      <button id="reset" class="btn-reset" type="button">Azzera</button>
    </div>
  </div>

  <div class="wrap result-line">
    <span id="count">0</span> mazzi trovati
  </div>

  <div class="wrap catalog-grid-wrap">
    <div id="grid" class="deck-grid" aria-live="polite"></div>
    <div id="sentinel" class="sentinel"></div>
  </div>
</main>

<!-- ===== Footer ===== -->
<footer class="site-footer">
  <div class="wrap">
    <a class="brand" href="{{base}}">
      <span class="mark" style="color:var(--green)">&#9824;</span>
      <span class="name">Catalogo Carte di Luigi</span>
    </a>
    <span class="suits"><span class="s-blk">&#9824;</span> <span class="s-red">&#9829;</span> <span class="s-red">&#9830;</span> <span class="s-blk">&#9827;</span></span>
    <p>{{count}} mazzi catalogati &middot; &copy; {{year}} &middot; Collezione privata</p>
  </div>
</footer>

<script src="{{base}}assets/js/theme.js"></script>
<script src="{{base}}assets/js/catalogo.js"></script>
